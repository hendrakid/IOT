<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Lock Admin — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Smart Lock Admin</h1>
    <p class="text-sm text-gray-500 text-center mb-6">Masuk untuk mengelola kartu RFID</p>

    <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700"></div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Username</label>
        <input
          id="username" name="username" type="text" required autocomplete="username"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          placeholder="admin"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input
          id="password" name="password" type="password" required autocomplete="current-password"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          placeholder="••••••••"
        />
      </div>
      <button
        type="submit"
        id="submit-btn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors text-sm disabled:opacity-60"
      >
        Masuk
      </button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem("token")) {
      window.location.href = "/dashboard";
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const errorDiv = document.getElementById("error-msg");

      btn.disabled = true;
      btn.textContent = "Memproses...";
      errorDiv.classList.add("hidden");

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const json = await res.json();

        if (!res.ok || !json.success) {
          throw new Error(json.error ?? "Login gagal");
        }

        localStorage.setItem("token", json.data.token);
        window.location.href = "/dashboard";
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Masuk";
      }
    });
  </script>
</body>
</html>
