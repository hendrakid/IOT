<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Lock Admin — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif'] } } } }</script>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center font-sans">

  <div class="w-full max-w-md mx-4">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl mb-4">
        <span class="material-symbols-outlined text-white text-3xl">lock</span>
      </div>
      <h1 class="text-2xl font-bold text-white">Smart Lock Admin</h1>
      <p class="text-slate-400 text-sm mt-1">Access Control Management System</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8">
      <h2 class="text-lg font-semibold text-white mb-1">Masuk ke Dashboard</h2>
      <p class="text-slate-400 text-sm mb-6">Masukkan kredensial admin Anda</p>

      <div id="error-msg" class="hidden mb-4 p-3 bg-red-950 border border-red-800 rounded-lg text-sm text-red-400 flex items-center gap-2">
        <span class="material-symbols-outlined text-base">error</span>
        <span id="error-text"></span>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5" for="username">Username</label>
          <input
            id="username" name="username" type="text" required autocomplete="username"
            class="w-full px-3.5 py-2.5 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm text-white placeholder-slate-500"
            placeholder="admin"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5" for="password">Password</label>
          <input
            id="password" name="password" type="password" required autocomplete="current-password"
            class="w-full px-3.5 py-2.5 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm text-white placeholder-slate-500"
            placeholder="••••••••"
          />
        </div>
        <button
          type="submit"
          id="submit-btn"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm disabled:opacity-50 disabled:cursor-not-allowed mt-2"
        >
          Masuk
        </button>
      </form>
    </div>
  </div>

  <script>
    if (localStorage.getItem("token")) {
      window.location.href = "/dashboard";
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const errorDiv = document.getElementById("error-msg");
      const errorText = document.getElementById("error-text");

      btn.disabled = true;
      btn.textContent = "Memproses...";
      errorDiv.classList.add("hidden");

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const json = await res.json();

        if (!res.ok || !json.success) {
          throw new Error(json.error ?? "Login gagal");
        }

        localStorage.setItem("token", json.data.token);
        window.location.href = "/dashboard";
      } catch (err) {
        errorText.textContent = err.message;
        errorDiv.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Masuk";
      }
    });
  </script>
</body>
</html>
